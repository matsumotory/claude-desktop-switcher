name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Attach the signed + notarized csw CLI binary to the release, in the same run so
  # it works under GITHUB_TOKEN (a release-event trigger would not fire). Reusable
  # workflow is also workflow_dispatch-able to back-fill an existing tag.
  publish-csw:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    uses: ./.github/workflows/csw-cli.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit

  build-mac-dmg:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Configure App Store Connect API Key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          echo "$APPLE_API_KEY_CONTENT" | base64 -d > "${{ runner.temp }}/AuthKey_${APPLE_API_KEY}.p8"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # action-v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
        with:
          tagName: ${{ needs.release-please.outputs.tag_name }}
          args: --target universal-apple-darwin

      # tauri-action notarizes and staples the .app, but the .dmg wrapper is only
      # signed. Notarize + staple the .dmg too so downloaded disk images mount
      # without a Gatekeeper warning, then replace the uploaded asset.
      - name: Notarize and staple the DMG
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DMG="$(find target/universal-apple-darwin/release/bundle/dmg -name '*.dmg' | head -n 1)"
          echo "Notarizing $DMG"
          xcrun notarytool submit "$DMG" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          gh release upload "$TAG_NAME" "$DMG" --clobber

      - name: Clean up App Store Connect API Key
        if: always()
        run: rm -f "${{ runner.temp }}"/AuthKey_*.p8

  # Attach CycloneDX SBOMs for the shipped binaries (both macOS targets of the
  # universal build). Runs on ubuntu because SBOM generation only reads the
  # dependency graph; kept independent so a failure never blocks the DMG.
  sbom:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate SBOMs for the macOS targets
        run: |
          cargo cyclonedx --format json --target aarch64-apple-darwin --target-in-filename -qq
          cargo cyclonedx --format json --target x86_64-apple-darwin --target-in-filename -qq

      - name: Upload SBOMs to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "$TAG_NAME" \
            crates/desktop/csw-desktop_aarch64-apple-darwin.cdx.json \
            crates/desktop/csw-desktop_x86_64-apple-darwin.cdx.json \
            crates/cli/csw-cli_aarch64-apple-darwin.cdx.json \
            crates/cli/csw-cli_x86_64-apple-darwin.cdx.json \
            --clobber

      # Unexplained assets on the release page read as an accident or a leak, so
      # every release ships a RELEASE-README.md describing each file, and the same
      # guide is appended to the release notes. Templates live in .github/.
      - name: Attach the release README and asset guide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          sed "s/__VERSION__/${VERSION}/g" .github/release-readme.md > RELEASE-README.md
          gh release upload "$TAG_NAME" RELEASE-README.md --clobber
          BODY="$(gh release view "$TAG_NAME" --json body --jq .body)"
          if ! printf '%s' "$BODY" | grep -q '### 添付ファイルの説明'; then
            sed "s/__VERSION__/${VERSION}/g" .github/release-notes-assets.md > asset-guide.md
            { printf '%s\n\n' "$BODY"; cat asset-guide.md; } > new-body.md
            gh release edit "$TAG_NAME" --notes-file new-body.md
          fi
